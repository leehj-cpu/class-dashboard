<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강동고등학교 2학년 7반 대시보드</title>
    <style>
        :root {
            --bg-color: #f0f4f8; 
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #95a5a6;
            --accent-color: #4CAF50;
            --info-color: #3498db;
            --Sunday-color: #e74c3c;
            --Saturday-color: #3498db;
            --border-radius: 16px;
        }

        body {
            margin: 0; padding: 25px;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            height: 100vh; display: grid;
            grid-template-rows: 60px 1fr; gap: 25px;
            box-sizing: border-box;
            color: var(--text-main);
        }

        /* ✨ 수정된 헤더 영역 (Grid 레이아웃 적용) */
        header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* 좌우 1비율, 가운데 내용물 크기만큼 */
            align-items: center;
            padding: 0 10px; 
        }
        .date-header { 
            font-size: 1.5rem; color: #7f8c8d; 
            letter-spacing: -0.5px; font-weight: bold;
            justify-self: start; /* 왼쪽 정렬 */
        }
        .main-title {
            font-size: 2.2rem; font-weight: 900;
            color: #1a252f;
            justify-self: center; /* 중앙 정렬 */
            letter-spacing: -1px;
            display: flex; align-items: center; gap: 10px;
        }
        .clock { 
            font-size: 2.5rem; color: var(--accent-color); 
            font-weight: 800; letter-spacing: 1px; 
            justify-self: end; /* 오른쪽 정렬 */
        }

        main {
            display: grid;
            grid-template-columns: 1fr 2.2fr 1fr;
            gap: 25px;
            height: 100%;
        }

        .panel {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 1.5rem; margin-bottom: 20px; margin-top: 0;
            display: flex; align-items: center; gap: 10px;
            font-weight: 800; color: #1a252f;
        }

        /* 시간표 스타일 */
        .time-slot {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 16px; margin-bottom: 10px;
            background: #f8fafc; border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .period-num {
            width: 32px; height: 32px; background: #e2e8f0;
            color: #64748b; display: flex;
            justify-content: center; align-items: center;
            border-radius: 8px; font-weight: 800; font-size: 1rem;
        }
        .subject-name { font-weight: 700; font-size: 1.2rem; flex: 1; margin-left: 14px; }
        .status-badge {
            background: #e2e8f0; color: #64748b;
            font-size: 0.8rem; padding: 5px 10px; border-radius: 6px; font-weight: 600;
        }
        .time-slot.current { 
            background: var(--accent-color); color: white; 
            box-shadow: 0 8px 16px rgba(76, 175, 80, 0.2);
            transform: translateY(-2px);
        }
        .time-slot.current .period-num { background: rgba(255,255,255,0.2); color: white; }
        .time-slot.current .status-badge { background: white; color: var(--accent-color); }

        /* 세련된 달력 스타일 */
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 8px; height: 100%; margin-top: 5px;
        }
        .cal-header {
            text-align: center; padding: 5px 0 15px 0;
            font-weight: 700; color: var(--text-muted);
            font-size: 1rem;
        }
        .cal-header.sun { color: #e74c3c; opacity: 0.8; }
        .cal-header.sat { color: #3498db; opacity: 0.8; }
        
        .cal-day {
            background: #f8fafc; border-radius: 12px;
            padding: 8px; display: flex; flex-direction: column; gap: 4px;
            min-height: 85px;
        }
        .cal-day.empty { background: transparent; }
        .cal-day.today { 
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.15);
            border: 1px solid rgba(52, 152, 219, 0.2);
        }
        
        .day-num {
            width: 28px; height: 28px; font-weight: 700; display: flex;
            justify-content: center; align-items: center; border-radius: 50%;
            font-size: 1rem; color: #34495e; align-self: flex-start;
        }
        .cal-day.today .day-num { background: var(--info-color); color: white; }
        .cal-day:not(.today) .sun { color: var(--Sunday-color); }
        .cal-day:not(.today) .sat { color: var(--Saturday-color); }

        .event-item {
            font-size: 0.8rem; padding: 4px 8px; border-radius: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-weight: 600;
        }
        .event-item.accent { background: #edf7ed; color: #2e7d32; border-left: 3px solid var(--accent-color); }
        .event-item.info { background: #e3f2fd; color: #1565c0; border-left: 3px solid var(--info-color); }

        /* 공지사항 스타일 */
        .notice-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        .notice-list li {
            background: #f8fafc; padding: 15px 18px; border-radius: 12px;
            font-size: 1.15rem; line-height: 1.5; font-weight: 500;
            display: flex; gap: 10px;
        }
        .notice-list li::before { content: '📣'; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <div class="date-header" id="date-header">날짜 로딩 중...</div>
        <div class="main-title">🏫 2학년 7반 학급 대시보드 ✨</div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <main>
        <div class="panel">
            <h2 class="panel-title">⏰ 시간표</h2>
            <div id="timetable-content">로딩 중...</div>
        </div>

        <div class="panel">
            <h2 class="panel-title" id="calendar-title">📅 학급 일정</h2>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="panel">
            <h2 class="panel-title">📢 알림판</h2>
            <ul class="notice-list" id="notice-content"><li>로딩 중...</li></ul>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwfvim9T5dqii87-RDmEVv_lIV3Aoc7Wsl1Aq5fdfgXVvNxIAY9txD2DSkPOdVWvD_7aA/exec";

        // 강동고등학교 실제 일과 시간표 적용
        const classTimes = {
            "조회": { start: 800, end: 810 },
            "준비": { start: 810, end: 820 },
            "1": { start: 820, end: 910 },
            "2": { start: 920, end: 1010 },
            "3": { start: 1020, end: 1110 },
            "4": { start: 1120, end: 1210 },
            "중식": { start: 1210, end: 1310 },
            "5": { start: 1310, end: 1400 },
            "6": { start: 1410, end: 1500 },
            "7": { start: 1510, end: 1600 }
        };

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                updateDashboard(data);
            } catch (e) { console.error("데이터 오류:", e); }
        }

        function updateDashboard(data) {
            const now = new Date();
            const actualDay = now.getDay();
            
            // 주말(토, 일)에는 월요일(1) 시간표와 공지사항을 미리 보여줍니다.
            let timetableDay = (actualDay === 0 || actualDay === 6) ? 1 : actualDay;

            const daysName = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            document.getElementById('date-header').textContent = 
                `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 ${daysName[actualDay]}`;
            
            document.getElementById('calendar-title').innerHTML = `📅 ${now.getMonth()+1}월 학급 일정`;

            // 1. 시간표 렌더링
            const timetable = data.weeklyTimetable[timetableDay] || [];
            document.getElementById('timetable-content').innerHTML = timetable.map(item => `
                <div class="time-slot" data-period="${item.period}">
                    <div class="period-num">${item.period}</div>
                    <div class="subject-name">${item.subject}</div>
                    <div class="status-container"></div>
                </div>
            `).join('');

            // 2. ✨ 요일별 공지사항 렌더링 (새로 바뀐 부분)
            // 오늘 요일(timetableDay)에 맞는 공지사항 배열만 쏙 빼옵니다.
            const todaysNotices = data.weeklyNotices[timetableDay] || [];
            
            document.getElementById('notice-content').innerHTML = todaysNotices.length > 0 ? 
                todaysNotices.map(t => `<li><span>${t}</span></li>`).join('') : '<li><span>오늘의 특별한 공지사항이 없습니다.</span></li>';

            // 3. 달력 렌더링
            renderCalendar(data.schedules);
            highlightCurrentPeriod();
        }

        function renderCalendar(schedules) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            
            let html = ['일','월','화','수','목','금','토'].map((d, i) => 
                `<div class="cal-header ${i==0?'sun':i==6?'sat':''}">${d}</div>`).join('');

            for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

            for (let d = 1; d <= lastDate; d++) {
                const isToday = d === now.getDate() ? 'today' : '';
                const dayIdx = (firstDay + d - 1) % 7;
                const colorClass = dayIdx === 0 ? 'sun' : dayIdx === 6 ? 'sat' : '';
                
                const dayEvents = schedules.filter(s => {
                    const sDate = new Date(s.date);
                    return sDate.getDate() === d && sDate.getMonth() === month;
                });

                const eventHtml = dayEvents.map(e => {
                    const c = e.event.includes('평가') || e.event.includes('시험') ? 'info' : 'accent';
                    return `<div class="event-item ${c}">${e.event}</div>`;
                }).join('');

                html += `<div class="cal-day ${isToday}">
                            <span class="day-num ${colorClass}">${d}</span>
                            ${eventHtml}
                         </div>`;
            }
            grid.innerHTML = html;
        }

        function highlightCurrentPeriod() {
            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('current');
                const statusContainer = slot.querySelector('.status-container');
                statusContainer.innerHTML = ''; 

                const p = String(slot.dataset.period);
                const t = classTimes[p];
                
                if (t) {
                    const sMin = Math.floor(t.start / 100) * 60 + (t.start % 100);
                    const eMin = Math.floor(t.end / 100) * 60 + (t.end % 100);

                    if (curMin >= sMin && curMin <= eMin) {
                        slot.classList.add('current');
                        let msg = "수업 중";
                        if (p === "조회") msg = "조회 중";
                        if (p === "준비") msg = "수업 준비";
                        if (p === "중식") msg = "점심 시간";
                        statusContainer.innerHTML = `<div class="status-badge">${msg}</div>`;
                    } else if (curMin >= sMin - 10 && curMin < sMin) {
                        statusContainer.innerHTML = '<div class="status-badge" style="background:#e74c3c; color:white;">곧 시작</div>';
                    }
                }
            });
        }

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
            highlightCurrentPeriod();
        }

        setInterval(updateClock, 1000);
        setInterval(fetchData, 60000);
        updateClock(); fetchData();
    </script>
</body>
</html>
