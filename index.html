<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강동고등학교 2학년 7반 대시보드</title>
    <style>
        :root {
            --bg-color: #f0f4f8; --card-bg: #ffffff;
            --text-main: #2c3e50; --text-muted: #95a5a6;
            --accent-color: #4CAF50; --info-color: #3498db;
            --border-radius: 20px;
        }

        body {
            margin: 0; padding: 25px; font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color); min-height: 100vh;
            display: grid; grid-template-rows: 60px 1fr; gap: 20px; box-sizing: border-box; color: var(--text-main);
            /* 모바일 환경에서 길게 누를 때 텍스트 선택 및 기본 팝업 방지 */
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }

        .fluent-emoji {
            height: 1.3em; width: 1.3em; vertical-align: -0.25em;
            display: inline-block; object-fit: contain; border: none; background: transparent;
        }

        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 10px; }
        .date-header { font-size: 1.5rem; color: #7f8c8d; letter-spacing: -0.5px; font-weight: bold; justify-self: start; }
        .main-title { font-size: 2.2rem; font-weight: 900; color: #1a252f; justify-self: center; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .clock { font-size: 2.5rem; color: var(--accent-color); font-weight: 800; letter-spacing: 1px; justify-self: end; }

        main { display: grid; grid-template-columns: 1fr 2.2fr 1fr; gap: 20px; align-items: stretch; }

        .panel {
            background: var(--card-bg); border-radius: var(--border-radius);
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-title { font-size: 1.4rem; margin-bottom: 15px; margin-top: 0; display: flex; align-items: center; gap: 10px; font-weight: 800; color: #1a252f; }

        .side-column { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        
        .left-column .panel:last-child { flex: 1; } 
        .center-column .calendar-panel { flex: 1; display: flex; flex-direction: column; } 
        .closing-panel { flex: 0 0 auto; }
        .right-column .photo-panel { flex: 1; display: flex; flex-direction: column; padding: 0; min-height: 200px; overflow: hidden; } 
        .notice-panel { flex: 0 0 auto; height: auto; } 
        .history-panel { flex: 0 0 auto; height: auto; background: #fffcf8; border: 2px dashed #f3e5ab; } 

        .time-slot { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; margin-bottom: 8px; background: #ffffff; border-radius: 15px; border: 1px solid #f1f2f6; transition: all 0.3s ease; }
        .period-num { width: 34px; height: 34px; color: white; display: flex; justify-content: center; align-items: center; border-radius: 10px; font-weight: 900; }
        .time-slot:nth-child(7n+1) .period-num { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .time-slot:nth-child(7n+2) .period-num { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .time-slot:nth-child(7n+3) .period-num { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .time-slot:nth-child(7n+4) .period-num { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .time-slot:nth-child(7n+5) .period-num { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .time-slot:nth-child(7n+6) .period-num { background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%); color: #2d3436; }
        .time-slot:nth-child(7n) .period-num { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        .subject-name { font-weight: 800; font-size: 1.15rem; flex: 1; margin-left: 12px; color: #2d3436; transition: all 0.3s ease; }
        
        .status-badge-container { display: flex; align-items: center; }
        .status-badge { font-size: 0.85rem; padding: 4px 10px; border-radius: 12px; font-weight: 900; margin-left: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); letter-spacing: -0.5px; }

        .time-slot.current { background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%); color: white; transform: scale(1.02); border: none; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2); }
        .time-slot.current .period-num { background: rgba(255,255,255,0.2); color:white;}
        .time-slot.current .subject-name { color: white; }
        .time-slot.current .status-badge { background: rgba(255,255,255,0.25); color: white; }

        .time-slot.upcoming { background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%); transform: scale(1.02); border: none; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.2); }
        .time-slot.upcoming .period-num { background: rgba(255,255,255,0.3); color: white; }
        .time-slot.upcoming .subject-name { color: white; }
        .time-slot.upcoming .status-badge { background: rgba(0,0,0,0.15); color: white; animation: badge-pulse 1s infinite alternate; }
        @keyframes badge-pulse { from { transform: scale(1); opacity: 0.9; } to { transform: scale(1.05); opacity: 1; } }

        #meal-content { display: flex; flex-direction: column; gap: 8px; }
        .meal-item { display: flex; align-items: center; gap: 10px; padding: 10px 15px; border-radius: 15px; font-weight: 800; font-size: 1.1rem; }
        .meal-item:nth-child(6n+1) { background: #fff3cd; color: #d35400; }
        .meal-item:nth-child(6n+2) { background: #ffe4e1; color: #c0392b; }
        .meal-item:nth-child(6n+3) { background: #dff9fb; color: #00b894; }
        .meal-item:nth-child(6n+4) { background: #e0f7fa; color: #0984e3; }
        .meal-item:nth-child(6n+5) { background: #f3e5f5; color: #8e44ad; }
        .meal-emoji { display: flex; align-items: center; justify-content: center; margin-right: 5px; }
        .meal-emoji .fluent-emoji { width: 2.2rem; height: 2.2rem; vertical-align: middle; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: max-content; grid-auto-rows: 1fr; gap: 8px; flex: 1; }
        .cal-header { text-align: center; font-weight: 800; font-size: 0.95rem; padding-bottom: 5px; color: var(--text-muted); }
        .cal-header.sun { color: #e74c3c; } .cal-header.sat { color: #3498db; }
        .cal-day { background: #f8fafc; border-radius: 12px; padding: 6px; display: flex; flex-direction: column; min-height: 70px; border: 2px solid transparent; }
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.sun-day { background-color: #fff5f5; } .cal-day.sun-day .day-num { color: #e74c3c; }
        .cal-day.sat-day { background-color: #f0f7ff; } .cal-day.sat-day .day-num { color: #3498db; }
        .day-num { font-weight: 800; font-size: 0.95rem; margin-bottom: 4px; display: inline-flex; justify-content: center; align-items: center; width: 26px; height: 26px; border-radius: 50%; color: #2d3436; align-self: flex-start; }
        .cal-day.today { background: #ffffff; border: 2px solid #3498db; box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15); }
        .cal-day.today .day-num { background: #3498db; color: white !important; box-shadow: 0 2px 6px rgba(52, 152, 219, 0.4); }
        
        .event-item { font-size: 0.82rem; padding: 4px 8px; border-radius: 6px; font-weight: 900; margin-bottom: 3px; border-left: 4px solid rgba(0,0,0,0.1); }
        .event-item.birthday { background: #fff0f5; color: #c81d6d; border-left-color: #fd79a8; } 
        .event-item.performance { background: #f3e5f5; color: #6a1b9a; border-left-color: #9b59b6; } 
        .event-item.exam { background: #fee2e2; color: #b71c1c; border-left-color: #e74c3c; } 
        .event-item.holiday { background: #fff5f5; color: #e74c3c; border-left-color: #ff7675; } 
        .event-item.default { background: #edf7ed; color: #1b5e20; border-left-color: #4CAF50; }

        .cal-nav-btn { border:none; background:#f0f4f8; border-radius:8px; cursor:pointer; padding:5px 12px; font-weight:bold; color:#2c3e50; transition: transform 0.1s; }
        .cal-nav-btn:active { transform: scale(0.9); }
        .cal-today-btn { border:none; background:#3498db; color:white; border-radius:8px; cursor:pointer; padding:5px 12px; font-size:0.85rem; font-weight:bold; transition: transform 0.1s; }
        .cal-today-btn:active { transform: scale(0.9); }

        /* ✨ 공통 데이터 리스트 (알림판, 종례) */
        .data-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
        .data-list li { 
            padding: 16px 20px; border-radius: 18px; font-size: 1.35rem; line-height: 1.4; 
            font-weight: 900; display: flex; gap: 12px; align-items: center; position: relative; 
            transition: all 0.2s ease; cursor: pointer; border: 2px solid transparent;
        }
        /* 액티브(눌림) 상태일 때 시각적 피드백 */
        .data-list li:active { transform: scale(0.98); border: 2px solid rgba(0,0,0,0.2); }

        .history-panel .panel-title { color: #d35400; justify-content: space-between; }
        .history-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .history-list li { background: #ffffff; border: 1px solid #f1e9d2; border-left: 4px solid #f39c12; padding: 12px 15px; border-radius: 12px; font-size: 1.2rem; font-weight: 800; color: #2c3e50; display: flex; align-items: center; gap: 12px; }
        .history-list li .time { font-size: 1rem; color: #e67e22; background: #fef5e7; padding: 4px 10px; border-radius: 8px; font-weight: 900; }
        
        .noti-btn { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: transform 0.1s;}
        .noti-btn:active { transform: scale(0.9); }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 0.9rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: transform 0.1s;}
        .clear-btn:active { transform: scale(0.9); }

        #class-photo { width: 100%; height: 100%; object-fit: cover; border-radius: var(--border-radius); }

        /* === 9. 모달창 디자인 === */
        #call-popup {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(231, 76, 60, 0.95); z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; font-size: 5rem; font-weight: 900;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3); animation: siren-glow 1s infinite alternate;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        #call-popup.show { opacity: 1; pointer-events: auto; }
        .siren-emoji { width: 8rem; height: 8rem; margin-bottom: 20px; animation: spin 2s infinite linear; object-fit: contain; }
        
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.95) 0%, rgba(162, 155, 254, 0.95) 100%); 
            z-index: 1000; flex-direction: column; justify-content: center; align-items: center; 
            backdrop-filter: blur(8px);
        }
        .modal-content-box { text-align: center; color: white; width: 90%; max-width: 600px; position: relative;}
        .modal-text-emoji { font-size: 7rem; margin-bottom: 10px; animation: float 2s infinite ease-in-out; display: inline-block; }
        
        .modal-input {
            width: 100%; padding: 25px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.95); 
            border: none; border-radius: 20px; font-size: 1.5rem; font-weight: 800; color: #2c3e50; 
            box-sizing: border-box; box-shadow: 0 15px 35px rgba(0,0,0,0.2); outline: none;
        }
        .modal-input::placeholder { color: #a5b1c2; }

        /* ✨ 액션 메뉴 (수정/삭제 팝업) */
        .action-menu {
            display: none; position: absolute; background: white; border-radius: 12px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.25); padding: 8px; z-index: 1000;
            flex-direction: column; gap: 5px; min-width: 160px;
        }
        .action-menu button {
            border: none; background: transparent; padding: 12px 15px; font-size: 1.15rem; font-weight: 800; 
            color: #2c3e50; cursor: pointer; border-radius: 8px; text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .action-menu button:hover { background: #f1f2f6; }
        .action-menu button.delete-action { color: #e74c3c; }
        
        @keyframes siren-glow { from { box-shadow: inset 0 0 50px rgba(192, 57, 43, 0.5); } to { box-shadow: inset 0 0 200px rgba(192, 57, 43, 1); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body>

    <div id="call-popup">
        <img class="siren-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Police%20car%20light/3D/police_car_light_3d.png" alt="🚨">
        <div><span id="call-name" style="color:#ffeaa7;">학생</span> 학생!</div>
        <div style="font-size: 3rem; margin-top: 20px;">지금 바로 교무실로 와주세요</div>
    </div>

    <div id="item-action-menu" class="action-menu">
        <button onclick="handleAction('edit')"><img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Pencil/3D/pencil_3d.png"> 수정하기</button>
        <button class="delete-action" onclick="handleAction('delete')"><img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Wastebasket/3D/wastebasket_3d.png"> 삭제하기</button>
    </div>

    <header>
        <div class="date-header" id="date-header">날짜 로딩 중...</div>
        <div class="main-title" id="main-title-area">
            <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/School/3D/school_3d.png" alt="🏫"> 
            2학년 7반 대시보드 
            <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Sparkles/3D/sparkles_3d.png" alt="✨">
        </div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <main>
        <div class="side-column left-column">
            <div class="panel">
                <h2 class="panel-title">
                    <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Alarm%20clock/3D/alarm_clock_3d.png"> 시간표
                </h2>
                <div id="timetable-content"></div>
            </div>
            <div class="panel">
                <h2 class="panel-title">
                    <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Bento%20box/3D/bento_box_3d.png"> 오늘의 급식
                </h2>
                <div id="meal-content"></div>
            </div>
        </div>

        <div class="side-column center-column">
            <div class="panel calendar-panel">
                <h2 class="panel-title" style="justify-content: space-between;">
                    <span id="calendar-title-text">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Calendar/3D/calendar_3d.png"> 학급 일정
                    </span>
                    <div style="display: flex; gap: 8px;">
                        <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
                        <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
                        <button class="cal-today-btn" onclick="resetMonth()">이번 달</button>
                    </div>
                </h2>
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>

            <div class="panel closing-panel">
                <h2 class="panel-title" style="justify-content: space-between;">
                    <span><img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Memo/3D/memo_3d.png"> 종례 미리보기</span>
                    <button class="noti-btn" onclick="openDataModal('closing', 'add')" style="background: #e67e22;">
                        추가 <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Plus/3D/plus_3d.png" style="height:1em; width:1em; vertical-align:-0.15em;">
                    </button>
                </h2>
                <span style="font-size: 0.85rem; color: #e74c3c; margin-bottom: 10px; font-weight: 800;">💡 수정/삭제하려면 항목을 1초간 꾹~ 누르세요.</span>
                <ul class="data-list" id="closing-content"></ul>
            </div>
        </div>

        <div class="side-column right-column">
            <div class="panel notice-panel">
                <h2 class="panel-title" style="justify-content: space-between;">
                    <span><img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Megaphone/3D/megaphone_3d.png"> 알림판</span>
                    <button class="noti-btn" onclick="openDataModal('notice', 'add')" style="background: #3498db;">
                        추가 <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Plus/3D/plus_3d.png" style="height:1em; width:1em; vertical-align:-0.15em;">
                    </button>
                </h2>
                <span style="font-size: 0.85rem; color: #e74c3c; margin-bottom: 10px; font-weight: 800;">💡 수정/삭제하려면 항목을 1초간 꾹~ 누르세요.</span>
                <ul class="data-list" id="notice-content"></ul>
            </div>

            <div class="panel history-panel">
                <h2 class="panel-title">
                    <span style="display:flex; align-items:center; gap:8px;">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Mobile%20phone/3D/mobile_phone_3d.png"> 최근 호출 내역
                    </span>
                    <div style="display: flex; gap: 5px;">
                        <button class="noti-btn" onclick="requestNotificationPermission()">알림 <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Bell/3D/bell_3d.png" style="height:1em; width:1em; vertical-align:-0.15em;"></button>
                        <button class="clear-btn" onclick="clearCallHistory()">삭제 <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Wastebasket/3D/wastebasket_3d.png" style="height:1em; width:1em; vertical-align:-0.15em;"></button>
                    </div>
                </h2>
                <ul class="history-list" id="history-content"></ul>
            </div>
            
            <div class="panel photo-panel">
                <img id="class-photo" src="april207.jpg" alt="우리반 단체 사진">
            </div>
        </div>

        <div style="position: fixed; bottom: 30px; right: 30px; z-index: 100;">
            <button onclick="openCallModal()" style="display:flex; align-items:center; gap:8px; background: #6c5ce7; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.3rem; font-weight: 900; box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4); cursor: pointer; transition: transform 0.2s;" onmousedown="this.style.transform='scale(0.95)'" onmouseup="this.style.transform='scale(1)'">
                <span style="font-size: 1.5rem;">🙋‍♂️</span> 선생님 호출하기 
            </button>
        </div>

        <div id="teacher-call-modal" class="modal-overlay">
            <div class="modal-content-box">
                <div class="modal-text-emoji">🙋‍♂️</div>
                <h2 style="font-size: 3.5rem; margin-top: 0; margin-bottom: 30px; font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.3);">선생님 호출하기</h2>
                <input type="text" id="student-name" class="modal-input" placeholder="이름을 적어주세요 (예: 홍길동)">
                <textarea id="call-reason" class="modal-input" placeholder="무슨 일인가요? 사유를 간단히 적어주세요." style="height: 180px; resize: none; font-family: inherit;"></textarea>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <button onclick="closeCallModal()" style="flex: 1; padding: 20px; background: rgba(255,255,255,0.15); color: white; border: 3px solid rgba(255,255,255,0.5); border-radius: 20px; font-size: 1.6rem; font-weight: 900; cursor: pointer; transition: background 0.3s;">취소</button>
                    <button id="send-btn" onclick="sendTeacherCall()" style="flex: 2; padding: 20px; background: #f1c40f; color: #2c3e50; border: none; border-radius: 20px; font-size: 1.6rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 25px rgba(241, 196, 15, 0.4);">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Rocket/3D/rocket_3d.png" style="height:1.2em; width:1.2em; vertical-align:-0.2em;"> 전송하기
                    </button>
                </div>
            </div>
        </div>

        <div id="data-manage-modal" class="modal-overlay">
            <div class="modal-content-box">
                <img id="data-modal-icon" class="fluent-emoji" src="" style="width: 7rem; height: 7rem; margin-bottom: 10px; animation: float 2s infinite ease-in-out;">
                <h2 id="data-modal-title" style="font-size: 3.5rem; margin-top: 0; margin-bottom: 30px; font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.3);">제목</h2>
                <textarea id="data-input-text" class="modal-input" placeholder="내용을 입력하세요..." style="height: 180px; resize: none; font-family: inherit;"></textarea>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <button onclick="closeDataModal()" style="flex: 1; padding: 20px; background: rgba(255,255,255,0.15); color: white; border: 3px solid rgba(255,255,255,0.5); border-radius: 20px; font-size: 1.6rem; font-weight: 900; cursor: pointer;">취소</button>
                    <button id="data-save-btn" onclick="submitDataAction()" style="flex: 2; padding: 20px; background: #e67e22; color: white; border: none; border-radius: 20px; font-size: 1.6rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 25px rgba(230, 126, 34, 0.4); display:flex; justify-content:center; align-items:center; gap:10px;">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Check%20mark%20button/3D/check_mark_button_3d.png" style="height:1.2em; width:1.2em; vertical-align:-0.2em;"> <span id="data-btn-text">저장하기</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 💡 1단계에서 새로 발급받은 URL을 꼭 여기에 넣으세요!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwQ4Wsi3SCe3Im1CV_YLGIG1eYKglQvNBMdfHGWRIfmOwvDhS6dNkhIzvOBUe_A4maQpw/exec";

        let currentSchedules = [];
        let displayDate = new Date();
        
        let currentActionType = ''; let currentActionMode = ''; let currentActionIndex = -1;
        let pressTimer = null; // 롱프레스 타이머

        const classTimes = {
            "조회": { start: 800, end: 810 }, "준비": { start: 810, end: 820 },
            "1": { start: 820, end: 910 }, "2": { start: 920, end: 1010 },
            "3": { start: 1020, end: 1110 }, "4": { start: 1120, end: 1210 },
            "중식": { start: 1210, end: 1310 }, "5": { start: 1310, end: 1400 },
            "6": { start: 1410, end: 1500 }, "7": { start: 1510, end: 1600 }
        };

        const msFoodEmojis = [
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Cooked%20rice/3D/cooked_rice_3d.png',
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Pot%20of%20food/3D/pot_of_food_3d.png',
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Meat%20on%20bone/3D/meat_on_bone_3d.png',
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Green%20salad/3D/green_salad_3d.png',
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Fried%20shrimp/3D/fried_shrimp_3d.png',
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Cooking/3D/cooking_3d.png',
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Spaghetti/3D/spaghetti_3d.png',
            'https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Sandwich/3D/sandwich_3d.png'
        ];

        const noticeColors = [
            { bg: '#fff9c4', text: '#d35400' }, { bg: '#ffebee', text: '#c0392b' },
            { bg: '#e8f5e9', text: '#27ae60' }, { bg: '#e3f2fd', text: '#2980b9' },
            { bg: '#f3e5f5', text: '#8e44ad' }, { bg: '#e0f7fa', text: '#0097a7' },
            { bg: '#fff3e0', text: '#e67e22' }
        ];

        function requestNotificationPermission() {
            if (!("Notification" in window)) { alert("이 브라우저는 알림을 지원하지 않습니다."); } 
            else if (Notification.permission === "granted") { alert("이미 알림이 켜져 있습니다!"); } 
            else if (Notification.permission !== "denied") { Notification.requestPermission().then(p => { if (p === "granted") alert("알림이 켜졌습니다! 🔔"); }); }
        }

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                updateDashboard(data);
            } catch (e) { console.error("데이터 오류:", e); }
        }

        let lastNotifiedStudent = null;
        async function fetchCallStatus() {
            try {
                const response = await fetch(GAS_URL + "?action=check_call");
                const data = await response.json();
                const popup = document.getElementById('call-popup');
                const nameSpan = document.getElementById('call-name');
                if (data.callStudent) { 
                    nameSpan.textContent = data.callStudent; popup.classList.add('show'); 
                    if (lastNotifiedStudent !== data.callStudent) {
                        if ("Notification" in window && Notification.permission === "granted") { new Notification("🚨 2-7 호출 알림", { body: `${data.callStudent} 학생! 교무실로 와주세요.` }); }
                        lastNotifiedStudent = data.callStudent;
                    }
                } else { popup.classList.remove('show'); lastNotifiedStudent = null; }

                if (data.callHistory && data.callHistory.length > 0) {
                    document.getElementById('history-content').innerHTML = data.callHistory.map(h => `<li><span class="time">${h.time}</span><span>${h.text}</span></li>`).join('');
                } else {
                    document.getElementById('history-content').innerHTML = `<li><span style="color:#95a5a6; font-size:1rem;">최근 호출 기록이 없습니다.</span></li>`;
                }
            } catch (e) { }
        }

        async function clearCallHistory() {
            if(!confirm("최근 호출 내역을 모두 지우시겠습니까?")) return;
            document.getElementById('history-content').innerHTML = `<li><span style="color:#95a5a6; font-size:1rem;">최근 호출 기록이 없습니다.</span></li>`;
            document.getElementById('call-popup').classList.remove('show');
            try { await fetch(GAS_URL + "?action=clear_history"); } catch(e) { }
        }

        function updateDashboard(data) {
            const now = new Date(); const actualDay = now.getDay(); let timetableDay = (actualDay === 0 || actualDay === 6) ? 1 : actualDay;
            document.getElementById('date-header').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;

            document.getElementById('timetable-content').innerHTML = (data.weeklyTimetable[timetableDay] || []).filter(item => item.subject && item.subject.trim() !== "").map(item => `
                <div class="time-slot" data-period="${item.period}"><div class="period-num">${item.period}</div><div class="subject-name">${item.subject}</div><div class="status-badge-container"></div></div>`).join('');
            document.getElementById('meal-content').innerHTML = data.lunchMenu.map((menu, index) => `<div class="meal-item"><div class="meal-emoji"><img class="fluent-emoji" src="${msFoodEmojis[index % msFoodEmojis.length]}"></div><div class="meal-name">${menu}</div></div>`).join('');
            
            // ✨ 알림판 렌더링 (마우스 & 터치 이벤트 모두 연결)
            const noticeArray = data.noticeList || [];
            if (noticeArray.length > 0) {
                document.getElementById('notice-content').innerHTML = noticeArray.map((text, idx) => {
                    const colorPick = noticeColors[idx % noticeColors.length];
                    return `
                    <li style="background: ${colorPick.bg}; color: ${colorPick.text};" 
                        onmousedown="startPress('notice', ${idx}, event)" onmouseup="cancelPress()" onmouseleave="cancelPress()"
                        ontouchstart="startPress('notice', ${idx}, event)" ontouchend="cancelPress()" ontouchcancel="cancelPress()">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Megaphone/3D/megaphone_3d.png" style="width:1.5em; height:1.5em; margin-right:8px;">
                        <span class="item-text">${text}</span>
                    </li>`;
                }).join('');
            } else { document.getElementById('notice-content').innerHTML = '<li style="background: #f8fafc; color: #95a5a6;"><span>오늘의 공지사항이 없습니다.</span></li>'; }

            // ✨ 종례판 렌더링
            const closingArray = data.closingList || [];
            if (closingArray.length > 0) {
                document.getElementById('closing-content').innerHTML = closingArray.map((text, idx) => {
                    const colorPick = noticeColors[(idx + 3) % noticeColors.length];
                    return `
                    <li style="background: ${colorPick.bg}; color: ${colorPick.text};" 
                        onmousedown="startPress('closing', ${idx}, event)" onmouseup="cancelPress()" onmouseleave="cancelPress()"
                        ontouchstart="startPress('closing', ${idx}, event)" ontouchend="cancelPress()" ontouchcancel="cancelPress()">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Pushpin/3D/pushpin_3d.png" style="width:1.5em; height:1.5em; margin-right:8px;">
                        <span class="item-text">${text}</span>
                    </li>`;
                }).join('');
            } else { document.getElementById('closing-content').innerHTML = '<li style="background: #f8fafc; color: #95a5a6;"><span>등록된 종례사항이 없습니다.</span></li>'; }

            currentSchedules = data.schedules;
            updateCalendarUI();

            const targetDate = new Date(2026, 3, 24); const dDayDiff = Math.round((targetDate - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / (1000 * 60 * 60 * 24));
            const dDayText = dDayDiff > 0 ? `D-${dDayDiff}` : (dDayDiff === 0 ? "D-Day" : "완료");
            document.querySelector('.main-title').innerHTML = `<img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/School/3D/school_3d.png"> 2학년 7반 대시보드 <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Sparkles/3D/sparkles_3d.png"> <span style="color:#e74c3c; margin-left:15px; font-size:1.8rem; background: #fee2e2; padding: 5px 15px; border-radius: 20px; display:flex; align-items:center; gap:8px;"><img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Fire/3D/fire_3d.png"> 중간고사 ${dDayText} <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Fire/3D/fire_3d.png"></span>`;
        }

        function changeMonth(offset) { displayDate.setMonth(displayDate.getMonth() + offset); updateCalendarUI(); }
        function resetMonth() { displayDate = new Date(); updateCalendarUI(); }
        function updateCalendarUI() { document.getElementById('calendar-title-text').innerHTML = `<img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Calendar/3D/calendar_3d.png"> ${displayDate.getFullYear()}년 ${displayDate.getMonth()+1}월 학급 일정`; renderCalendar(currentSchedules); }

        function renderCalendar(schedules) {
            const year = displayDate.getFullYear(); const month = displayDate.getMonth(); const today = new Date();
            const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            let html = ['일','월','화','수','목','금','토'].map((d, i) => `<div class="cal-header ${i==0?'sun':i==6?'sat':''}">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
            for (let d = 1; d <= lastDate; d++) {
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) ? 'today' : '';
                const dayIdx = (firstDay + d - 1) % 7; let weekendClass = dayIdx === 0 ? 'sun-day' : (dayIdx === 6 ? 'sat-day' : '');
                const currentCheckDate = new Date(year, month, d);
                const dayEvents = schedules.filter(s => { 
                    const sStart = new Date(s.date); const sEnd = new Date(s.endDate);
                    const startDay = new Date(sStart.getFullYear(), sStart.getMonth(), sStart.getDate());
                    const endDay = new Date(sEnd.getFullYear(), sEnd.getMonth(), sEnd.getDate());
                    return currentCheckDate >= startDay && currentCheckDate <= endDay;
                });
                const eventHtml = dayEvents.map(e => {
                    let c = 'default'; const t = e.event;
                    if (t.includes('생일')) c = 'birthday'; else if (t.includes('수행') || t.includes('평가')) c = 'performance'; 
                    else if (t.includes('시험') || t.includes('고사')) c = 'exam'; else if (dayIdx === 0 || ['날', '절', '추석', '설날', '신정', '기독탄신일'].some(w => t.includes(w))) c = 'holiday';
                    return `<div class="event-item ${c}">${t}</div>`;
                }).join('');
                html += `<div class="cal-day ${isToday} ${weekendClass}"><span class="day-num">${d}</span>${eventHtml}</div>`;
            }
            grid.innerHTML = html;
        }

        function openCallModal() { document.getElementById('teacher-call-modal').style.display = 'flex'; }
        function closeCallModal() { document.getElementById('teacher-call-modal').style.display = 'none'; document.getElementById('student-name').value = ''; document.getElementById('call-reason').value = ''; }
        async function sendTeacherCall() {
            const name = document.getElementById('student-name').value; const reason = document.getElementById('call-reason').value;
            if (!name || !reason) { alert("이름과 사유를 모두 적어주세요!"); return; }
            const btn = document.getElementById('send-btn'); const originalText = btn.innerHTML;
            btn.innerHTML = `<img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Hourglass%20not%20done/3D/hourglass_not_done_3d.png" style="height:1.2em; width:1.2em;"> 전송 중...`; btn.disabled = true;
            try {
                const response = await fetch(`${GAS_URL}?action=student_call&name=${encodeURIComponent(name)}&reason=${encodeURIComponent(reason)}`);
                if (response.ok) { alert("성공적으로 보냈습니다! 🚀"); closeCallModal(); }
            } catch (e) { alert("전송 실패."); } finally { btn.innerHTML = originalText; btn.disabled = false; }
        }

        // --- ✨ 공지/종례 통합 관리 로직 ---
        function openDataModal(type, mode, index = -1, existingText = '') {
            currentActionType = type; currentActionMode = mode; currentActionIndex = index;
            const modal = document.getElementById('data-manage-modal');
            const title = document.getElementById('data-modal-title');
            const icon = document.getElementById('data-modal-icon');
            const input = document.getElementById('data-input-text');
            const btnText = document.getElementById('data-btn-text');
            const saveBtn = document.getElementById('data-save-btn');

            if(type === 'notice') {
                title.innerText = mode === 'add' ? "알림판 추가" : "알림판 수정";
                icon.src = "https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Megaphone/3D/megaphone_3d.png";
                saveBtn.style.background = "#3498db";
            } else {
                title.innerText = mode === 'add' ? "종례 추가" : "종례 수정";
                icon.src = "https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Memo/3D/memo_3d.png";
                saveBtn.style.background = "#e67e22";
            }
            btnText.innerText = mode === 'add' ? "등록하기" : "수정완료";
            input.value = existingText;
            document.getElementById('item-action-menu').style.display = 'none';
            modal.style.display = 'flex';
        }

        function closeDataModal() { document.getElementById('data-manage-modal').style.display = 'none'; document.getElementById('data-input-text').value = ''; }

        async function submitDataAction() {
            const content = document.getElementById('data-input-text').value;
            if (!content.trim()) { alert("내용을 입력해주세요!"); return; }
            
            const btn = document.getElementById('data-save-btn'); const btnText = document.getElementById('data-btn-text');
            const originalText = btnText.innerText; btnText.innerText = "처리 중... ⏳"; btn.disabled = true;

            const actionCommand = currentActionMode === 'add' ? 'add_item' : 'edit_item';
            const url = `${GAS_URL}?action=${actionCommand}&type=${currentActionType}&index=${currentActionIndex}&content=${encodeURIComponent(content)}`;

            try {
                await fetch(url);
                closeDataModal(); fetchData(); 
            } catch(e) { alert("서버 통신 실패."); } finally { btnText.innerText = originalText; btn.disabled = false; }
        }

        // --- ✨ 롱프레스 로직 개선 (정확한 0.8초 타이머) ---
        function startPress(type, index, e) {
            // 버튼 클릭 시 텍스트 블록 지정 방지
            e.preventDefault(); 
            
            pressTimer = setTimeout(() => {
                const menu = document.getElementById('item-action-menu');
                const listItem = e.currentTarget;
                const existingText = listItem.querySelector('.item-text').innerText;
                
                currentActionType = type; currentActionIndex = index;
                menu.dataset.text = existingText; 
                
                // 마우스 또는 터치 좌표로 메뉴 띄우기
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                menu.style.left = `${clientX}px`; menu.style.top = `${clientY}px`;
                menu.style.display = 'flex';
            }, 800); 
        }

        function cancelPress() {
            clearTimeout(pressTimer);
        }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('item-action-menu');
            if(menu.style.display === 'flex' && !menu.contains(e.target)) { menu.style.display = 'none'; }
        });

        async function handleAction(actionType) {
            document.getElementById('item-action-menu').style.display = 'none';
            if (actionType === 'edit') {
                const text = document.getElementById('item-action-menu').dataset.text;
                openDataModal(currentActionType, 'edit', currentActionIndex, text);
            } else if (actionType === 'delete') {
                if(confirm("이 항목을 정말 삭제하시겠습니까? 🗑️")) {
                    try {
                        await fetch(`${GAS_URL}?action=delete_item&type=${currentActionType}&index=${currentActionIndex}`);
                        fetchData();
                    } catch(e) { alert("삭제 실패."); }
                }
            }
        }

        function highlightCurrentPeriod() {
            const now = new Date(); const curMin = now.getHours() * 60 + now.getMinutes();
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('current', 'upcoming');
                const badgeContainer = slot.querySelector('.status-badge-container');
                if(badgeContainer) badgeContainer.innerHTML = ''; 
                const subjectName = slot.querySelector('.subject-name').textContent.trim();
                const p = String(slot.dataset.period); const t = classTimes[p];
                if (t && subjectName !== "") { 
                    const sMin = Math.floor(t.start / 100) * 60 + (t.start % 100); const eMin = Math.floor(t.end / 100) * 60 + (t.end % 100);
                    if (curMin >= sMin && curMin < eMin) {
                        slot.classList.add('current');
                        if(badgeContainer) badgeContainer.innerHTML = '<span class="status-badge">수업 중</span>';
                    } else if (curMin < sMin && curMin >= sMin - 10) { 
                        slot.classList.add('upcoming');
                        if(badgeContainer) badgeContainer.innerHTML = `<span class="status-badge upcoming-badge">${sMin - curMin}분 전</span>`;
                    }
                }
            });
        }

        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false }); highlightCurrentPeriod(); }
        setInterval(updateClock, 1000); setInterval(fetchData, 3600000); setInterval(fetchCallStatus, 3000); 
        updateClock(); fetchData(); fetchCallStatus(); 
    </script>
</body>
</html>
