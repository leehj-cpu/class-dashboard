<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강동고등학교 2학년 7반 대시보드</title>
    <style>
        :root {
            --bg-color: #f0f4f8; --card-bg: #ffffff; --text-main: #2c3e50;
            --text-muted: #95a5a6; --accent-color: #4CAF50; --info-color: #3498db;
            --Sunday-color: #e74c3c; --Saturday-color: #3498db; --border-radius: 16px;
        }

        body {
            margin: 0; padding: 25px; font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color); height: 100vh; display: grid;
            grid-template-rows: 60px 1fr; gap: 25px; box-sizing: border-box; color: var(--text-main);
        }

        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 10px; }
        .date-header { font-size: 1.5rem; color: #7f8c8d; font-weight: bold; justify-self: start; }
        .main-title { font-size: 2.2rem; font-weight: 900; color: #1a252f; justify-self: center; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .clock { font-size: 2.5rem; color: var(--accent-color); font-weight: 800; justify-self: end; }

        main { display: grid; grid-template-columns: 1fr 2.2fr 1fr; gap: 25px; height: 100%; }

        .panel { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); display: flex; flex-direction: column; overflow: hidden; }
        .panel-title { font-size: 1.4rem; margin-bottom: 15px; margin-top: 0; display: flex; align-items: center; gap: 10px; font-weight: 800; }

        /* 좌측/우측 2단 분할용 컨테이너 */
        .side-column { display: grid; grid-template-rows: 1.5fr 1fr; gap: 25px; height: 100%; }

        /* 시간표 및 급식 리스트 */
        .time-slot, .meal-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; margin-bottom: 8px; background: #f8fafc; border-radius: 10px; }
        .period-num { width: 28px; height: 28px; background: #e2e8f0; color: #64748b; display: flex; justify-content: center; align-items: center; border-radius: 6px; font-weight: 800; font-size: 0.9rem; }
        .subject-name, .meal-name { font-weight: 700; font-size: 1.1rem; flex: 1; margin-left: 12px; }
        .status-badge { background: #e2e8f0; color: #64748b; font-size: 0.75rem; padding: 4px 8px; border-radius: 5px; font-weight: 600; }
        .time-slot.current { background: var(--accent-color); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(76,175,80,0.2); }
        .time-slot.current .period-num { background: rgba(255,255,255,0.2); color: white; }
        .time-slot.current .status-badge { background: white; color: var(--accent-color); }

        /* 달력 및 기타 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; height: 100%; }
        .cal-header { text-align: center; padding-bottom: 10px; font-weight: 700; color: var(--text-muted); }
        .cal-day { background: #f8fafc; border-radius: 12px; padding: 8px; display: flex; flex-direction: column; min-height: 80px; }
        .cal-day.today { background: #ffffff; border: 1px solid rgba(52,152,219,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day-num { width: 26px; height: 26px; font-weight: 700; display: flex; justify-content: center; align-items: center; border-radius: 50%; font-size: 0.9rem; }
        .cal-day.today .day-num { background: var(--info-color); color: white; }
        .event-item { font-size: 0.75rem; padding: 3px 6px; border-radius: 5px; font-weight: 600; margin-top: 2px; }
        .event-item.exam { background: #fee2e2; color: #c0392b; border-left: 3px solid #e74c3c; }
        .event-item.performance { background: #f3e5f5; color: #8e44ad; border-left: 3px solid #9b59b6; }
        .event-item.birthday { background: #fff0f5; color: #e84393; border-left: 3px solid #fd79a8; }
        .event-item.default { background: #edf7ed; color: #2e7d32; border-left: 3px solid #4CAF50; }

        .notice-list { list-style: none; padding: 0; margin: 0; }
        .notice-list li { background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-weight: 500; display: flex; gap: 8px; }
        .photo-panel { padding: 0; }
        #class-photo { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <div class="date-header" id="date-header">날짜 로딩 중...</div>
        <div class="main-title">🏫 2학년 7반 학급 대시보드 ✨</div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <main>
        <div class="side-column">
            <div class="panel">
                <h2 class="panel-title">⏰ 시간표</h2>
                <div id="timetable-content">로딩 중...</div>
            </div>
            <div class="panel">
                <h2 class="panel-title">🍱 오늘의 급식</h2>
                <div id="meal-content">식단을 불러오는 중...</div>
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title" id="calendar-title">📅 학급 일정</h2>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="side-column">
            <div class="panel" style="overflow-y: auto;">
                <h2 class="panel-title">📢 알림판</h2>
                <ul class="notice-list" id="notice-content"><li>로딩 중...</li></ul>
            </div>
            <div class="panel photo-panel">
                <img id="class-photo" src="우리반_사진_주소" alt="우리반 사진">
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwfvim9T5dqii87-RDmEVv_lIV3Aoc7Wsl1Aq5fdfgXVvNxIAY9txD2DSkPOdVWvD_7aA/exec";

        const classTimes = {
            "조회": { start: 800, end: 810 }, "준비": { start: 810, end: 820 },
            "1": { start: 820, end: 910 }, "2": { start: 920, end: 1010 },
            "3": { start: 1020, end: 1110 }, "4": { start: 1120, end: 1210 },
            "중식": { start: 1210, end: 1310 }, "5": { start: 1310, end: 1400 },
            "6": { start: 1410, end: 1500 }, "7": { start: 1510, end: 1600 }
        };

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                updateDashboard(data);
            } catch (e) { console.error("데이터 오류:", e); }
        }

        function updateDashboard(data) {
            const now = new Date();
            const actualDay = now.getDay();
            let timetableDay = (actualDay === 0 || actualDay === 6) ? 1 : actualDay;

            document.getElementById('date-header').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
            document.getElementById('calendar-title').textContent = `📅 ${now.getMonth()+1}월 학급 일정`;

            // 1. 시간표
            document.getElementById('timetable-content').innerHTML = (data.weeklyTimetable[timetableDay] || []).map(item => `
                <div class="time-slot" data-period="${item.period}">
                    <div class="period-num">${item.period}</div>
                    <div class="subject-name">${item.subject}</div>
                    <div class="status-container"></div>
                </div>
            `).join('');

            // 2. 급식 (✨ 추가된 부분)
            document.getElementById('meal-content').innerHTML = data.lunchMenu.map(menu => `
                <div class="meal-item"><div class="meal-name">${menu}</div></div>
            `).join('');

            // 3. 공지사항
            const todaysNotices = data.weeklyNotices[timetableDay] || [];
            document.getElementById('notice-content').innerHTML = todaysNotices.length > 0 ? todaysNotices.map(t => `<li><span>${t}</span></li>`).join('') : '<li><span>오늘의 공지가 없습니다.</span></li>';

            renderCalendar(data.schedules);
            highlightCurrentPeriod();

            // 4. D-Day (4월 24일 중간고사 고정 예시)
            const targetDate = new Date(2026, 3, 24);
            const dDayDiff = Math.round((targetDate - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / (1000 * 60 * 60 * 24));
            const dDayText = dDayDiff > 0 ? `D-${dDayDiff}` : (dDayDiff === 0 ? "D-Day" : "완료");
            document.querySelector('.main-title').innerHTML = `🏫 2학년 7반 대시보드 <span style="color:#e74c3c; margin-left:15px; font-size:1.8rem; background: #fee2e2; padding: 5px 15px; border-radius: 20px;">🔥 중간고사 ${dDayText} 🔥</span>`;
        }

        function renderCalendar(schedules) {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            
            let html = ['일','월','화','수','목','금','토'].map((d, i) => `<div class="cal-header ${i==0?'sun':i==6?'sat':''}">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

            for (let d = 1; d <= lastDate; d++) {
                const isToday = d === now.getDate() ? 'today' : '';
                const dayEvents = schedules.filter(s => { const sDate = new Date(s.date); return sDate.getDate() === d && sDate.getMonth() === month; });
                const eventHtml = dayEvents.map(e => {
                    let c = 'default';
                    if (e.event.includes('생일')) c = 'birthday';
                    else if (e.event.includes('수행') || e.event.includes('평가')) c = 'performance';
                    else if (e.event.includes('시험') || e.event.includes('고사')) c = 'exam';
                    return `<div class="event-item ${c}">${e.event}</div>`;
                }).join('');
                html += `<div class="cal-day ${isToday}"><span class="day-num">${d}</span>${eventHtml}</div>`;
            }
            grid.innerHTML = html;
        }

        function highlightCurrentPeriod() {
            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('current');
                const statusContainer = slot.querySelector('.status-container');
                statusContainer.innerHTML = '';
                const p = String(slot.dataset.period);
                const t = classTimes[p];
                if (t) {
                    const sMin = Math.floor(t.start / 100) * 60 + (t.start % 100);
                    const eMin = Math.floor(t.end / 100) * 60 + (t.end % 100);
                    if (curMin >= sMin && curMin <= eMin) {
                        slot.classList.add('current');
                        let msg = (p === "조회" || p === "준비" || p === "중식") ? (p === "중식" ? "점심 시간" : "진행 중") : "수업 중";
                        statusContainer.innerHTML = `<div class="status-badge">${msg}</div>`;
                    }
                }
            });
        }

        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false }); highlightCurrentPeriod(); }
        setInterval(updateClock, 1000); setInterval(fetchData, 60000);
        updateClock(); fetchData();
    </script>
</body>
</html>
