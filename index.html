<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강동고등학교 2학년 7반 대시보드</title>
    <style>
        /* [스타일 정의] 기존 변수 및 레이아웃 유지 */
        :root {
            --bg-color: #f0f4f8; --card-bg: #ffffff;
            --text-main: #2c3e50; --text-muted: #95a5a6;
            --accent-color: #4CAF50; --info-color: #3498db;
            --border-radius: 20px;
        }

        body {
            margin: 0; padding: 25px; font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color); min-height: 100vh;
            display: grid; grid-template-rows: 60px 1fr; gap: 20px; box-sizing: border-box; color: var(--text-main);
            -webkit-user-select: none; user-select: none;
        }

        /* 공통 패널 스타일 */
        .panel {
            background: var(--card-bg); border-radius: var(--border-radius);
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex; flex-direction: column;
        }

        /* 메인 레이아웃: 3단 정렬 및 바닥 높이 맞춤 */
        main { display: grid; grid-template-columns: 1fr 2.2fr 1fr; gap: 20px; align-items: stretch; }

        /* 데이터 리스트 스타일 (종례/공지) */
        .data-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        .data-list li { 
            padding: 16px 20px; border-radius: 18px; font-size: 1.2rem; font-weight: 900; 
            display: flex; gap: 12px; align-items: center; cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent; background: #f8fafc;
        }
        .data-list li:active { transform: scale(0.98); background: #eef2f7; }

        /* 상세보기 모달창 전용 스타일 */
        .detail-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 15px; margin-bottom: 20px; display: none; }
        .detail-text { font-size: 1.2rem; line-height: 1.8; color: #34495e; white-space: pre-wrap; text-align: left; margin-bottom: 30px; }

        /* 기존 모달 공통 스타일 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            z-index: 2000; flex-direction: column; justify-content: center; align-items: center; 
        }
        .modal-content-box { 
            background: white; border-radius: 30px; padding: 40px; width: 90%; max-width: 600px; 
            text-align: center; color: #2c3e50; max-height: 85vh; overflow-y: auto;
        }
        
        /* 모달 입력창 스타일 */
        .modal-input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ccc;
            font-size: 1rem; box-sizing: border-box; font-family: inherit;
        }

        .fluent-emoji { height: 1.3em; width: 1.3em; vertical-align: -0.25em; display: inline-block; }
        
        /* 캘린더 등 기타 스타일 추가 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-header { text-align: center; font-weight: bold; }
        .cal-day { min-height: 80px; padding: 5px; border-radius: 10px; background: #f8fafc; }
        .cal-day.today { background: #fff; border: 2px solid var(--info-color); }
        .event-item { font-size: 0.8rem; padding: 2px 4px; border-radius: 4px; background: var(--info-color); color: white; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header>
        <div id="date-header" style="font-size: 1.5rem; font-weight: bold; color: #7f8c8d;">날짜 로딩 중...</div>
        <div class="main-title">🏫 2학년 7반 대시보드 ✨</div>
        <div id="clock" style="font-size: 2.5rem; font-weight: 800; color: var(--accent-color);">00:00:00</div>
    </header>

    <main>
        <div class="side-column">
            <div class="panel">
                <h2 class="panel-title"><img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Alarm%20clock/3D/alarm_clock_3d.png"> 시간표</h2>
                <div id="timetable-content">로딩 중...</div>
            </div>
            <div class="panel" style="flex: 1;">
                <h2 class="panel-title"><img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Bento%20box/3D/bento_box_3d.png"> 급식</h2>
                <div id="meal-content">로딩 중...</div>
            </div>
        </div>

        <div class="side-column" style="flex: 2.2;">
            <div class="panel" style="flex: 1;">
                <h2 class="panel-title">📅 학급 일정</h2>
                <div id="calendar-grid" class="calendar-grid">로딩 중...</div>
            </div>
            <div class="panel">
                <h2 class="panel-title" style="justify-content: space-between;">
                    <span>📝 종례 미리보기</span>
                    <button onclick="openManageModal('closing', 'add')" style="padding: 8px 15px; border-radius: 10px; border:none; background: #e67e22; color:white; font-weight:bold; cursor:pointer;">추가</button>
                </h2>
                <ul id="closing-content" class="data-list">로딩 중...</ul>
            </div>
        </div>

        <div class="side-column">
            <div class="panel">
                <h2 class="panel-title" style="justify-content: space-between;">
                    <span>📢 알림판</span>
                    <button onclick="openManageModal('notice', 'add')" style="padding: 8px 15px; border-radius: 10px; border:none; background: #3498db; color:white; font-weight:bold; cursor:pointer;">추가</button>
                </h2>
                <ul id="notice-content" class="data-list">로딩 중...</ul>
            </div>
            <div class="panel" style="background: #fffcf8;">
                <h2 class="panel-title">📱 최근 호출</h2>
                <ul id="history-content">로딩 중...</ul>
            </div>
            <div class="panel" style="flex: 1; padding: 0; overflow: hidden;">
                <img id="class-photo" src="april207.jpg" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
            </div>
        </div>
    </main>

    <div id="detail-modal" class="modal-overlay" onclick="closeDetailModal(event)">
        <div class="modal-content-box" onclick="event.stopPropagation()">
            <h2 id="detail-title" style="font-size: 2.5rem; margin-bottom: 20px;">요약 제목</h2>
            <img id="detail-img" class="detail-img" src="">
            <div id="detail-body" class="detail-text">상세 내용이 표시됩니다.</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="prepareEdit()" style="flex: 1; padding: 15px; border-radius: 15px; border: none; background: #3498db; color: white; font-weight: bold; cursor: pointer;">수정하기</button>
                <button onclick="requestDelete()" style="flex: 1; padding: 15px; border-radius: 15px; border: none; background: #e74c3c; color: white; font-weight: bold; cursor: pointer;">삭제하기</button>
                <button onclick="closeDetailModal()" style="flex: 1; padding: 15px; border-radius: 15px; border: none; background: #95a5a6; color: white; font-weight: bold; cursor: pointer;">닫기</button>
            </div>
        </div>
    </div>

    <div id="manage-modal" class="modal-overlay" onclick="closeManageModal(event)">
        <div class="modal-content-box" onclick="event.stopPropagation()">
            <h2 id="manage-title" style="margin-top:0;">항목 관리</h2>
            <input type="text" id="input-summary" class="modal-input" placeholder="요약 제목 (리스트에 노출)">
            <textarea id="input-detail" class="modal-input" style="height: 150px;" placeholder="세부 내용 설명"></textarea>
            <input type="text" id="input-img" class="modal-input" placeholder="사진 URL (이미지 주소 붙여넣기)">
            <div style="display: flex; gap: 10px;">
                <button onclick="closeManageModal()" style="flex: 1; padding: 15px; border-radius: 15px; border: none; background: #95a5a6; color: white; font-weight: bold; cursor: pointer;">취소</button>
                <button id="save-btn" onclick="submitData()" style="flex: 2; padding: 15px; border-radius: 15px; border: none; background: #28a745; color: white; font-weight: bold; cursor: pointer;">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        // 🚨 반드시 본인의 새 배포 URL로 변경하세요 🚨
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyyZif7ya0gjxbDJN6dVQ0l-_1HbIdj6XDmQkzMIgUVdAaF1KG519TK_urdmusg8BvuvA/exec"; 
        
        let currentData = { closing: [], notice: [] };
        let activeItem = { type: '', index: -1 };

        // 날짜 및 시계 업데이트 로직 간소화
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ko-KR', { hour12: false });
            document.getElementById('date-header').textContent = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 1. 데이터 로드 및 전체 렌더링
        async function loadData() {
            try {
                const res = await fetch(GAS_URL);
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                
                // 데이터 할당
                currentData.closing = data.closingList || [];
                // 알림판 데이터가 기존 문자열 배열에서 객체 배열로 변경되었다고 가정
                currentData.notice = (data.noticeList || []).map(item => typeof item === 'string' ? {text: item} : item);
                
                // 종례 렌더링
                const closingHtml = currentData.closing.map((item, idx) => `
                    <li onclick="showDetail('closing', ${idx})">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Pushpin/3D/pushpin_3d.png">
                        <span>${item.text || item}</span>
                    </li>
                `).join('');
                document.getElementById('closing-content').innerHTML = closingHtml || "<li>등록된 종례가 없습니다.</li>";
                
                // 공지사항 렌더링
                const noticeHtml = currentData.notice.map((item, idx) => `
                    <li onclick="showDetail('notice', ${idx})">
                        <img class="fluent-emoji" src="https://cdn.jsdelivr.net/gh/microsoft/fluentui-emoji@main/assets/Megaphone/3D/megaphone_3d.png">
                        <span>${item.text || item}</span>
                    </li>
                `).join('');
                document.getElementById('notice-content').innerHTML = noticeHtml || "<li>등록된 공지사항이 없습니다.</li>";
                
                // 시간표, 급식, 캘린더, 호출 내역 등은 데이터 구조에 맞게 렌더링 추가 필요
                document.getElementById('timetable-content').innerText = "데이터 로드 완료";
                document.getElementById('meal-content').innerText = "데이터 로드 완료";
                document.getElementById('calendar-grid').innerText = "데이터 로드 완료";
                document.getElementById('history-content').innerHTML = "<li>호출 내역 없음</li>";
                
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('closing-content').innerHTML = "<li>데이터를 불러오지 못했습니다.</li>";
            }
        }

        // 2. 상세보기 모달 열기
        function showDetail(type, index) {
            const item = currentData[type][index];
            activeItem = { type, index };
            
            document.getElementById('detail-title').innerText = item.text || item; // 문자열 처리
            document.getElementById('detail-body').innerText = item.detail || "상세 내용이 없습니다.";
            
            const imgEl = document.getElementById('detail-img');
            if (item.img && item.img.startsWith('http')) {
                imgEl.src = item.img;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }
            
            document.getElementById('detail-modal').style.display = 'flex';
        }

        function closeDetailModal(event) { 
            if(event && event.target.id !== 'detail-modal') return;
            document.getElementById('detail-modal').style.display = 'none'; 
        }

        // 3. 추가/수정 모달 관리
        function openManageModal(type, mode) {
            activeItem.type = type;
            document.getElementById('manage-title').innerText = mode === 'add' ? "항목 추가" : "항목 수정";
            
            if (mode === 'add') {
                document.getElementById('input-summary').value = "";
                document.getElementById('input-detail').value = "";
                document.getElementById('input-img').value = "";
                activeItem.index = -1;
            } else {
                const item = currentData[type][activeItem.index];
                document.getElementById('input-summary').value = item.text || item;
                document.getElementById('input-detail').value = item.detail || "";
                document.getElementById('input-img').value = item.img || "";
            }
            document.getElementById('manage-modal').style.display = 'flex';
        }

        function closeManageModal(event) { 
             if(event && event.target.id !== 'manage-modal') return;
            document.getElementById('manage-modal').style.display = 'none'; 
        }

        function prepareEdit() {
            document.getElementById('detail-modal').style.display = 'none';
            openManageModal(activeItem.type, 'edit');
        }

        // 4. 서버로 데이터 전송
        async function submitData() {
            const summary = document.getElementById('input-summary').value;
            const detail = document.getElementById('input-detail').value;
            const img = document.getElementById('input-img').value;
            
            if(!summary) return alert("제목을 입력하세요.");

            const action = activeItem.index === -1 ? 'add_item' : 'edit_item';
            const url = `${GAS_URL}?action=${action}&type=${activeItem.type}&index=${activeItem.index}&content=${encodeURIComponent(summary)}&detail=${encodeURIComponent(detail)}&imgUrl=${encodeURIComponent(img)}`;
            
            const btn = document.getElementById('save-btn');
            btn.innerText = "처리 중...";
            btn.disabled = true;
            
            try {
                const res = await fetch(url);
                if(res.ok) {
                   await loadData();
                   closeManageModal();
                } else {
                    alert('저장 실패');
                }
            } catch(e) {
                alert('네트워크 오류');
            } finally {
                btn.innerText = "저장하기";
                btn.disabled = false;
            }
        }

        async function requestDelete() {
            if(!confirm("정말 삭제하시겠습니까?")) return;
            
            const url = `${GAS_URL}?action=delete_item&type=${activeItem.type}&index=${activeItem.index}`;
            try {
                const res = await fetch(url);
                 if(res.ok) {
                   await loadData();
                   document.getElementById('detail-modal').style.display = 'none';
                } else {
                    alert('삭제 실패');
                }
            } catch(e) {
                 alert('네트워크 오류');
            }
        }

        // 초기화 실행
        window.onload = loadData;
        
    </script>
</body>
</html>
