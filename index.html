<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강동고등학교 2학년 7반 대시보드</title>
    <style>
        :root {
            --bg-color: #f0f4f8; --card-bg: #ffffff;
            --text-main: #2c3e50; --text-muted: #95a5a6;
            --accent-color: #4CAF50; --info-color: #3498db;
            --border-radius: 20px;
        }

        /* ✨ 이모지가 흑백으로 깨지지 않도록 컬러 이모지 전용 폰트(Apple Color Emoji, Segoe UI Emoji 등)를 추가했습니다! */
        body {
            margin: 0; padding: 25px; 
            font-family: 'Pretendard', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
            background-color: var(--bg-color); min-height: 100vh;
            display: grid; grid-template-rows: 60px 1fr; gap: 20px; box-sizing: border-box; color: var(--text-main);
        }

        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 10px; }
        .date-header { font-size: 1.5rem; color: #7f8c8d; letter-spacing: -0.5px; font-weight: bold; justify-self: start; }
        .main-title { font-size: 2.2rem; font-weight: 900; color: #1a252f; justify-self: center; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .clock { font-size: 2.5rem; color: var(--accent-color); font-weight: 800; letter-spacing: 1px; justify-self: end; }

        main { display: grid; grid-template-columns: 1fr 2.2fr 1fr; gap: 20px; }

        .panel {
            background: var(--card-bg); border-radius: var(--border-radius);
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-title { font-size: 1.4rem; margin-bottom: 15px; margin-top: 0; display: flex; align-items: center; gap: 10px; font-weight: 800; color: #1a252f; }

        .side-column { display: grid; gap: 20px; height: max-content; }
        .left-column { grid-template-rows: auto auto; } 
        
        .right-column { display: flex; flex-direction: column; gap: 20px; }
        
        /* 알림판 높이 고정 해제 (자연스럽게 아래로 밀려남) */
        .notice-panel { height: auto; } 
        .history-panel { max-height: 280px; overflow-y: auto; background: #fffcf8; border: 2px dashed #f3e5ab; } 
        .photo-panel { min-height: 250px; padding: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; } 

        /* 시간표 스마트 알림 */
        .time-slot { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; margin-bottom: 8px; background: #ffffff; border-radius: 15px; border: 1px solid #f1f2f6; transition: all 0.3s ease; }
        .period-num { width: 34px; height: 34px; color: white; display: flex; justify-content: center; align-items: center; border-radius: 10px; font-weight: 900; transition: all 0.3s ease; }
        .time-slot:nth-child(7n+1) .period-num { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .time-slot:nth-child(7n+2) .period-num { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
        .time-slot:nth-child(7n+3) .period-num { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .time-slot:nth-child(7n+4) .period-num { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
        .time-slot:nth-child(7n+5) .period-num { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .time-slot:nth-child(7n+6) .period-num { background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%); color: #2d3436; }
        .time-slot:nth-child(7n) .period-num { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        .subject-name { font-weight: 800; font-size: 1.15rem; flex: 1; margin-left: 12px; color: #2d3436; transition: all 0.3s ease; }
        
        .status-badge-container { display: flex; align-items: center; }
        .status-badge { font-size: 0.85rem; padding: 4px 10px; border-radius: 12px; font-weight: 900; margin-left: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); letter-spacing: -0.5px; }

        .time-slot.current { background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%); transform: scale(1.02); border: none; box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2); }
        .time-slot.current .period-num { background: rgba(255,255,255,0.2); color: white; }
        .time-slot.current .subject-name { color: white; }
        .time-slot.current .status-badge { background: rgba(255,255,255,0.25); color: white; }

        .time-slot.upcoming { background: linear-gradient(135deg, #f39c12 0%, #f1c40f 100%); transform: scale(1.02); border: none; box-shadow: 0 5px 15px rgba(241, 196, 15, 0.2); }
        .time-slot.upcoming .period-num { background: rgba(255,255,255,0.3); color: white; }
        .time-slot.upcoming .subject-name { color: white; }
        .time-slot.upcoming .status-badge { background: rgba(0,0,0,0.15); color: white; animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { transform: scale(1); opacity: 0.9; } to { transform: scale(1.05); opacity: 1; } }

        /* 급식 (✨ 누락되었던 이모지 크기 및 간격 복구!) */
        #meal-content { display: flex; flex-direction: column; gap: 8px; }
        .meal-item { display: flex; align-items: center; gap: 10px; padding: 10px 15px; border-radius: 15px; font-weight: 800; font-size: 1.1rem; }
        .meal-item:nth-child(6n+1) { background: #fff3cd; color: #d35400; }
        .meal-item:nth-child(6n+2) { background: #ffe4e1; color: #c0392b; }
        .meal-item:nth-child(6n+3) { background: #dff9fb; color: #00b894; }
        .meal-item:nth-child(6n+4) { background: #e0f7fa; color: #0984e3; }
        .meal-item:nth-child(6n+5) { background: #f3e5f5; color: #8e44ad; }
        .meal-emoji { font-size: 1.5rem; display: inline-block; margin-right: 5px; }

        /* 커스텀 달력 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; height: 100%; }
        .cal-header { text-align: center; font-weight: 800; font-size: 0.95rem; padding-bottom: 5px; color: var(--text-muted); }
        .cal-header.sun { color: #e74c3c; } .cal-header.sat { color: #3498db; }
        .cal-day { background: #f8fafc; border-radius: 12px; padding: 6px; display: flex; flex-direction: column; min-height: 70px; border: 2px solid transparent; }
        .cal-day.empty { background: transparent; border: none; }
        .cal-day.sun-day { background-color: #fff5f5; } .cal-day.sun-day .day-num { color: #e74c3c; }
        .cal-day.sat-day { background-color: #f0f7ff; } .cal-day.sat-day .day-num { color: #3498db; }
        .day-num { font-weight: 800; font-size: 0.95rem; margin-bottom: 4px; display: inline-flex; justify-content: center; align-items: center; width: 26px; height: 26px; border-radius: 50%; color: #2d3436; align-self: flex-start; }
        .cal-day.today { background: #ffffff; border: 2px solid #3498db; box-shadow: 0 4px 12px rgba(52, 152, 219, 0.15); }
        .cal-day.today .day-num { background: #3498db; color: white !important; }
        
        .event-item { font-size: 0.82rem; padding: 4px 8px; border-radius: 6px; font-weight: 900; margin-bottom: 3px; border-left: 4px solid rgba(0,0,0,0.1); }
        .event-item.birthday { background: #fff0f5; color: #c81d6d; border-left-color: #fd79a8; } 
        .event-item.performance { background: #f3e5f5; color: #6a1b9a; border-left-color: #9b59b6; } 
        .event-item.exam { background: #fee2e2; color: #b71c1c; border-left-color: #e74c3c; } 
        .event-item.holiday { background: #fff5f5; color: #e74c3c; border-left-color: #ff7675; } 
        .event-item.default { background: #edf7ed; color: #1b5e20; border-left-color: #4CAF50; }

        .cal-nav-btn { border:none; background:#f0f4f8; border-radius:8px; cursor:pointer; padding: 5px 12px; font-weight:bold; }
        .cal-today-btn { border:none; background:#3498db; color:white; border-radius:8px; cursor:pointer; padding: 5px 12px; font-size:0.85rem; font-weight:bold; }

        /* 알림판 리스트 */
        .notice-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
        .notice-list li { padding: 16px 20px; border-radius: 18px; font-size: 1.35rem; line-height: 1.4; font-weight: 900; display: flex; gap: 12px; align-items: center; }
        .notice-list li::before { content: '📣'; font-size: 1.5rem; background: rgba(255, 255, 255, 0.6); width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; border-radius: 50%; flex-shrink: 0; }
        
        .history-panel .panel-title { color: #d35400; justify-content: space-between; }
        .history-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .history-list li { background: #ffffff; border: 1px solid #f1e9d2; border-left: 4px solid #f39c12; padding: 12px 15px; border-radius: 12px; font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 12px; }
        .history-list li .time { font-size: 1rem; color: #e67e22; background: #fef5e7; padding: 4px 10px; border-radius: 8px; font-weight: 900; }

        .noti-btn { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        #call-popup {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(231, 76, 60, 0.95); z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; font-size: 5rem; font-weight: 900;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        #call-popup.show { opacity: 1; pointer-events: auto; }
        
        #teacher-call-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.95) 0%, rgba(162, 155, 254, 0.95) 100%); 
            z-index: 1000; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        .modal-content-box { text-align: center; color: white; width: 90%; max-width: 600px; }
        .modal-input {
            width: 100%; padding: 25px; margin-bottom: 20px; background: rgba(255, 255, 255, 0.95); 
            border: none; border-radius: 20px; font-size: 1.5rem; font-weight: 800; color: #2c3e50; box-sizing: border-box; outline: none;
        }
    </style>
</head>
<body>

    <div id="call-popup">
        <div style="font-size: 8rem; margin-bottom: 20px;">🚨</div>
        <div><span id="call-name" style="color:#ffeaa7;">학생</span> 학생!</div>
        <div style="font-size: 3rem; margin-top: 20px;">지금 바로 교무실로 와주세요</div>
    </div>

    <header>
        <div class="date-header" id="date-header">날짜 로딩 중...</div>
        <div class="main-title" id="main-title-area">🏫 2학년 7반 대시보드 ✨</div>
        <div class="clock" id="clock">00:00:00</div>
    </header>

    <main>
        <div class="side-column left-column">
            <div class="panel">
                <h2 class="panel-title">⏰ 시간표</h2>
                <div id="timetable-content"></div>
            </div>
            <div class="panel">
                <h2 class="panel-title">🍱 오늘의 급식</h2>
                <div id="meal-content"></div>
            </div>
        </div>

        <div class="panel">
            <h2 class="panel-title" style="justify-content: space-between;">
                <span id="calendar-title-text">📅 학급 일정</span>
                <div style="display: flex; gap: 8px;">
                    <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
                    <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
                    <button class="cal-today-btn" onclick="resetMonth()">이번 달</button>
                </div>
            </h2>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>

        <div class="side-column right-column">
            <div class="panel notice-panel">
                <h2 class="panel-title">📢 알림판</h2>
                <ul class="notice-list" id="notice-content"></ul>
            </div>
            <div class="panel history-panel">
                <h2 class="panel-title">
                    <span>📱 최근 호출 내역</span>
                    <div>
                        <button class="noti-btn" onclick="requestNotificationPermission()">알림 켜기 🔔</button>
                        <button class="clear-btn" onclick="clearCallHistory()">모두 삭제 🗑️</button>
                    </div>
                </h2>
                <ul class="history-list" id="history-content"></ul>
            </div>
            <div class="panel photo-panel">
                <img id="class-photo" src="april207.jpg" alt="우리반 단체 사진" style="width:100%; height:100%; object-fit:cover; border-radius:20px;">
            </div>
        </div>

        <div style="position: fixed; bottom: 30px; right: 30px; z-index: 100;">
            <button onclick="openCallModal()" style="background: #6c5ce7; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.3rem; font-weight: 900; box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4); cursor: pointer;">
        🙋‍♂️ 선생님 호출하기 </button>
        </div>

        <div id="teacher-call-modal">
            <div class="modal-content-box">
                <h2 style="font-size: 3.5rem; margin-top: 0; margin-bottom: 30px; font-weight: 900;">선생님 호출하기</h2>
                <input type="text" id="student-name" class="modal-input" placeholder="이름을 적어주세요">
                <textarea id="call-reason" class="modal-input" placeholder="사유를 간단히 적어주세요" style="height: 180px; resize: none; font-family: inherit;"></textarea>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <button onclick="closeCallModal()" style="flex: 1; padding: 20px; background: rgba(255,255,255,0.15); color: white; border: 3px solid rgba(255,255,255,0.5); border-radius: 20px; font-size: 1.6rem; font-weight: 900; cursor: pointer;">취소</button>
                    <button onclick="sendTeacherCall()" style="flex: 2; padding: 20px; background: #f1c40f; color: #2c3e50; border: none; border-radius: 20px; font-size: 1.6rem; font-weight: 900; cursor: pointer;">🚀 전송하기</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ✨ 선생님의 최신 GAS URL을 꼭 확인해서 넣어주세요!
        const GAS_URL = "https://script.google.com/macros/s/AKfycby-7oPViRkyABIkin2dTVCoPH6IG43NdEorGbUnV4SOXSbk0emWwnnINfUG61Hw0joEPA/exec";

        let currentSchedules = [];
        let displayDate = new Date();

        function requestNotificationPermission() { if ("Notification" in window) Notification.requestPermission(); }

        const classTimes = {
            "조회": { start: 800, end: 810 }, "1": { start: 820, end: 910 }, "2": { start: 920, end: 1010 },
            "3": { start: 1020, end: 1110 }, "4": { start: 1120, end: 1210 }, "중식": { start: 1210, end: 1310 },
            "5": { start: 1310, end: 1400 }, "6": { start: 1410, end: 1500 }, "7": { start: 1510, end: 1600 }
        };

        const noticeColors = [
            { bg: '#fff9c4', text: '#d35400' }, { bg: '#ffebee', text: '#c0392b' },
            { bg: '#e8f5e9', text: '#27ae60' }, { bg: '#e3f2fd', text: '#2980b9' },
            { bg: '#f3e5f5', text: '#8e44ad' }, { bg: '#e0f7fa', text: '#0097a7' },
            { bg: '#fff3e0', text: '#e67e22' }
        ];

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                updateDashboard(data);
            } catch (e) { console.error("데이터 로딩 실패:", e); }
        }

        async function fetchCallStatus() {
            try {
                const response = await fetch(GAS_URL + "?action=check_call");
                const data = await response.json();
                const popup = document.getElementById('call-popup');
                if (data.callStudent) { 
                    document.getElementById('call-name').textContent = data.callStudent; 
                    popup.classList.add('show'); 
                } else { popup.classList.remove('show'); }
                if (data.callHistory) {
                    document.getElementById('history-content').innerHTML = data.callHistory.map(h => `<li><span class="time">${h.time}</span><span>${h.text}</span></li>`).join('');
                }
            } catch (e) { }
        }

        async function clearCallHistory() {
            if(!confirm("기록을 삭제하시겠습니까?")) return;
            try { await fetch(GAS_URL + "?action=clear_history"); } catch(e) { }
        }

        function updateDashboard(data) {
            const now = new Date(); const actualDay = now.getDay(); let timetableDay = (actualDay === 0 || actualDay === 6) ? 1 : actualDay;
            document.getElementById('date-header').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;

            const targetDate = new Date(2026, 3, 24); 
            const dDayDiff = Math.round((targetDate - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / (1000 * 60 * 60 * 24));
            const dDayText = dDayDiff > 0 ? `D-${dDayDiff}` : (dDayDiff === 0 ? "D-Day" : "완료");
            document.getElementById('main-title-area').innerHTML = `🏫 2학년 7반 대시보드 <span style="color:#e74c3c; margin-left:15px; font-size:1.8rem; background: #fee2e2; padding: 5px 15px; border-radius: 20px;">🔥 중간고사 ${dDayText} 🔥</span>`;

            document.getElementById('timetable-content').innerHTML = (data.weeklyTimetable[timetableDay] || []).map(item => `
                <div class="time-slot" data-period="${item.period}">
                    <div class="period-num">${item.period}</div>
                    <div class="subject-name">${item.subject}</div>
                    <div class="status-badge-container"></div>
                </div>
            `).join('');

            const foodEmojis = ['🍚', '🍲', '🍖', '🥗', '🍤', '🍳', '🍝', '🥪'];
            document.getElementById('meal-content').innerHTML = data.lunchMenu.map((menu, idx) => `<div class="meal-item"><div class="meal-emoji">${foodEmojis[idx % foodEmojis.length]}</div><div class="meal-name">${menu}</div></div>`).join('');
            
            const todaysNotices = data.weeklyNotices[timetableDay] || [];
            if (todaysNotices.length > 0) {
                document.getElementById('notice-content').innerHTML = todaysNotices.map(t => {
                    const colorPick = noticeColors[Math.floor(Math.random() * noticeColors.length)];
                    return `<li style="background: ${colorPick.bg}; color: ${colorPick.text};"><span>${t}</span></li>`;
                }).join('');
            } else {
                document.getElementById('notice-content').innerHTML = '<li style="background: #f8fafc; color: #95a5a6;"><span>오늘의 공지사항이 없습니다.</span></li>';
            }

            currentSchedules = data.schedules;
            updateCalendarUI();
        }

        function changeMonth(offset) { displayDate.setMonth(displayDate.getMonth() + offset); updateCalendarUI(); }
        function resetMonth() { displayDate = new Date(); updateCalendarUI(); }
        function updateCalendarUI() {
            document.getElementById('calendar-title-text').innerText = `📅 ${displayDate.getFullYear()}년 ${displayDate.getMonth()+1}월 학급 일정`;
            renderCalendar(currentSchedules);
        }

        function openCallModal() { document.getElementById('teacher-call-modal').style.display = 'flex'; }
        function closeCallModal() { document.getElementById('teacher-call-modal').style.display = 'none'; }

        async function sendTeacherCall() {
            const name = document.getElementById('student-name').value;
            const reason = document.getElementById('call-reason').value;
            if (!name || !reason) { alert("이름과 사유를 모두 적어주세요!"); return; }
            try {
                await fetch(`${GAS_URL}?action=student_call&name=${encodeURIComponent(name)}&reason=${encodeURIComponent(reason)}`);
                alert("선생님 구글챗으로 호출 메시지를 보냈습니다! 🚀"); closeCallModal();
            } catch (e) { alert("전송 실패"); }
        }

        function renderCalendar(schedules) {
            const year = displayDate.getFullYear(); const month = displayDate.getMonth(); const today = new Date();
            const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            let html = ['일','월','화','수','목','금','토'].map((d, i) => `<div class="cal-header ${i==0?'sun':i==6?'sat':''}">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;
            for (let d = 1; d <= lastDate; d++) {
                const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) ? 'today' : '';
                const dayIdx = (firstDay + d - 1) % 7; 
                let weekendClass = dayIdx === 0 ? 'sun-day' : (dayIdx === 6 ? 'sat-day' : '');
                const dayEvents = schedules.filter(s => { const sDate = new Date(s.date); return sDate.getDate() === d && sDate.getMonth() === month && sDate.getFullYear() === year; });
                
                const eventHtml = dayEvents.map(e => {
                    let c = 'default';
                    const t = e.event;
                    if (t.includes('생일')) c = 'birthday'; 
                    else if (t.includes('수행') || t.includes('평가')) c = 'performance'; 
                    else if (t.includes('시험') || t.includes('고사')) c = 'exam';
                    else if (dayIdx === 0 || ['날', '절', '추석', '설날', '신정', '기독탄신일'].some(w => t.includes(w))) c = 'holiday';
                    return `<div class="event-item ${c}">${t}</div>`;
                }).join('');
                html += `<div class="cal-day ${isToday} ${weekendClass}"><span class="day-num">${d}</span>${eventHtml}</div>`;
            }
            grid.innerHTML = html;
        }

        function highlightCurrentPeriod() {
            const now = new Date(); const curMin = now.getHours() * 60 + now.getMinutes();
            
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('current', 'upcoming');
                const badgeContainer = slot.querySelector('.status-badge-container');
                if(badgeContainer) badgeContainer.innerHTML = ''; 

                const p = String(slot.dataset.period); const t = classTimes[p];
                if (t) {
                    const sMin = Math.floor(t.start / 100) * 60 + (t.start % 100); 
                    const eMin = Math.floor(t.end / 100) * 60 + (t.end % 100);
                    
                    if (curMin >= sMin && curMin < eMin) {
                        slot.classList.add('current');
                        if(badgeContainer) badgeContainer.innerHTML = '<span class="status-badge">수업 중</span>';
                    } else if (curMin < sMin && curMin >= sMin - 10) { 
                        slot.classList.add('upcoming');
                        if(badgeContainer) badgeContainer.innerHTML = `<span class="status-badge upcoming-badge">${sMin - curMin}분 전</span>`;
                    }
                }
            });
        }

        function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false }); highlightCurrentPeriod(); }
        setInterval(updateClock, 1000); setInterval(fetchData, 3600000); setInterval(fetchCallStatus, 3000);
        updateClock(); fetchData(); fetchCallStatus(); 
    </script>
</body>
</html>
