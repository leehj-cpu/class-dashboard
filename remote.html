<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선생님 리모컨 (2학년 7반)</title>
    <style>
        body { 
            font-family: 'Pretendard', sans-serif; 
            padding: 20px; 
            background: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 90vh;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%;
            max-width: 350px;
            text-align: center; 
        }
        h2 { color: #2c3e50; margin-top: 0; }
        input { 
            width: 80%; 
            padding: 15px; 
            font-size: 1.2rem; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            text-align: center; 
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #6c5ce7; }
        button { 
            width: 100%; 
            padding: 15px; 
            font-size: 1.2rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 12px; 
            color: white; 
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .call-btn { background: #6c5ce7; box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }
        .end-btn { background: #e74c3c; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3); }
        .status { margin-top: 15px; color: #7f8c8d; font-size: 0.95rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📱 학생 호출 리모컨</h2>
        
        <input type="text" id="studentName" placeholder="학생 이름 (예: 홍길동)" onkeypress="if(event.keyCode==13) callStudent()">
        
        <button class="call-btn" onclick="callStudent()">🚨 호출하기</button>
        <button class="end-btn" onclick="endCall()">🛑 화면 팝업 닫기</button>
        
        <div id="status" class="status">대기 중...</div>
    </div>

    <script>
        // ✨ [중요] 반드시 index.html에 있는 것과 똑같은 주소를 넣으셔야 합니다!
        const GAS_URL = "https://script.google.com/macros/s/AKfycby-7oPViRkyABIkin2dTVCoPH6IG43NdEorGbUnV4SOXSbk0emWwnnINfUG61Hw0joEPA/exec";

        async function callStudent() {
            const name = document.getElementById('studentName').value.trim();
            if (!name) { 
                alert("학생 이름을 입력해주세요!"); 
                document.getElementById('studentName').focus();
                return; 
            }

            document.getElementById('status').innerText = "호출 신호 전송 중... 📡";
            try {
                // 선생님의 서버(doGet)에 맞춰 action=call 로 전송합니다.
                const response = await fetch(`${GAS_URL}?action=call&name=${encodeURIComponent(name)}`);
                if (response.ok) {
                    document.getElementById('status').innerText = `✅ [${name}] 호출 완료!`;
                    document.getElementById('studentName').value = ''; // 입력창 비우기
                }
            } catch(e) {
                document.getElementById('status').innerText = "❌ 전송 실패 (인터넷 연결 확인)";
            }
        }

        async function endCall() {
            document.getElementById('status').innerText = "종료 신호 전송 중... 📡";
            try {
                // 서버 코드의 '🛑 호출 종료' 로직에 맞춰 팝업을 닫는 신호를 보냅니다.
                const response = await fetch(`${GAS_URL}?action=call&name=${encodeURIComponent("🛑 호출 종료")}`);
                if (response.ok) {
                    document.getElementById('status').innerText = "✅ 대시보드 팝업 닫힘!";
                }
            } catch(e) {
                document.getElementById('status').innerText = "❌ 전송 실패";
            }
        }
    </script>
</body>
</html>
